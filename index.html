body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
.container { max-width: 1000px; margin: 0 auto; padding: 20px; }
.header { background: rgba(255, 255, 255, 0.95); padding: 40px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

.header p { font-size: 1.2em; color: #666; }
.search-section { margin: 30px 0; text-align: center; }
#searchInput { width: 100%; max-width: 600px; padding: 15px 25px; font-size: 1.1em; border: 2px solid #ddd; border-radius: 50px; outline: none; transition: all 0.3s; }
#searchInput:focus { border-color: #667eea; box-shadow: 0 0 10px rgba(102, 126, 234, 0.3); }
.modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
.module-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
.module-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
.module-card h3 { color: #667eea; margin-bottom: 10px; font-size: 1.3em; }
.module-card .code { display: inline-block; background: #667eea; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; margin-bottom: 10px; }
.module-card p { color: #666; line-height: 1.6; }
.footer { text-align: center; padding: 30px; color: white; margin-top: 50px; }
.back-btn { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: white; color: #667eea; text-decoration: none; border-radius: 25px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.back-btn:hover { background: #f0f0f0; }

/* === CSS TAMBAHAN UNTUK DETAIL MODUL === */
.module-detail-header { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: center; }
.module-detail-header h1 { color: #667eea; font-size: 2.2em; margin-bottom: 10px; }
.module-detail-header .dosen { font-size: 1.1em; color: #555; font-weight: 500; margin-top: 10px; }
.module-detail-header .kode { display: inline-block; background: #764ba2; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; margin-bottom: 15px; }
.section-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
.section-card h2 { color: #667eea; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.5em; }
.section-card p { line-height: 1.8; color: #444; text-align: justify; }
.timeline { position: relative; padding-left: 30px; }
.timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 3px; background: #667eea; border-radius: 5px; }
.timeline-item { position: relative; margin-bottom: 25px; background: #f9f9f9; padding: 15px 20px; border-radius: 10px; border-left: 4px solid #764ba2; transition: transform 0.2s; }
.timeline-item:hover { transform: translateX(5px); background: #f0f0f0; }
.timeline-item::before { content: ''; position: absolute; left: -26px; top: 20px; width: 15px; height: 15px; background: white; border: 3px solid #667eea; border-radius: 50%; }
.timeline-item .week-badge { display: inline-block; background: #667eea; color: white; padding: 3px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; margin-bottom: 8px; }
.timeline-item h3 { color: #333; font-size: 1.1em; margin: 0; }
.ref-list { list-style-type: none; padding: 0; }
.ref-list li { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #667eea; color: #444; line-height: 1.6; }
@media (max-width: 768px) { .header h1 { font-size: 1.8em; } .modules-grid { grid-template-columns: 1fr; } .module-detail-header h1 { font-size: 1.6em; } }

        function renderModules(moduleList) {
            const grid = document.getElementById('modulesGrid'); grid.innerHTML = '';
            moduleList.forEach(module => {
                const card = document.createElement('div'); card.className = 'module-card';
                card.onclick = () => window.location.href = module.link;
                card.innerHTML = `<span class="code">${module.code}</span><h3>${module.name}</h3><p>${module.description}</p>`;
                grid.appendChild(card);
            });
        }
        function searchModules() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = modules.filter(m => m.name.toLowerCase().includes(query) || m.code.toLowerCase().includes(query));
            renderModules(filtered);
        }
